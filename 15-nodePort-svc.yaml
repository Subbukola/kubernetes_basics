apiVersion: v1 
kind: Service
metadata:
  name: nodeport-svc
  labels:
    mode: nodeport

spec:
  type: NodePort # exposes to realworld
  selector:
    project: roboshop
    env: dev
  ports:
    - targetPort: 80
      port: 80
      protocol: TCP
      nodePort: 30000  #optional , by default it assigns some value


