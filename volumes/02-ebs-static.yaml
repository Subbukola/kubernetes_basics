apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-static
spec:
  capacity:
    storage: 10Gi
  
  accessModes:
  - ReadWriteOnce
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-051bf8eded2f19c93

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-static
spec:
  storageClassName: "" # Empty string must be explicitly set otherwise default StorageClass will be set
  volumeName: ebs-static
  accessModes:
  - ReadWriteOnce
  resources:  
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: Pod
metadata:
  name: ebs-static
spec:
  containers:
    - name: nginx 
      image: nginx
      volumeMounts:
      - mountPath: "/usr/share/nginx/html"
        name: html-data
  volumes:
    - name: html-data
      persistentVolumeClaim:
        claimName: ebs-static  # Must match the name of your PVC

  nodeSelector:
    topology.kubernetes.io/zone:  us-east-1d
